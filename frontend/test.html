<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlucoVeda Prakriti — Test</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        background: #0a0f1e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Segoe UI", sans-serif;
      }
      #glucoveda-capture {
        width: 100%;
        max-width: 480px;
      }
      #debug-label {
        color: #4ade80;
        font-size: 11px;
        font-family: monospace;
        margin-top: 10px;
        max-width: 480px;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #debug-panel {
        margin-top: 6px;
        width: 100%;
        max-width: 480px;
        background: #1e293b;
        border-radius: 10px;
        padding: 16px;
        color: #94a3b8;
        font-size: 12px;
        font-family: monospace;
        white-space: pre-wrap;
        max-height: 320px;
        overflow-y: auto;
        border: 1px solid #334155;
      }
      #gv-wrapper {
        font-family: "Segoe UI", sans-serif;
        max-width: 480px;
        margin: 0 auto;
        background: #0f172a;
        border-radius: 16px;
        overflow: hidden;
        color: #f8fafc;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      #gv-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;
        background: #1e293b;
        border-bottom: 1px solid #334155;
      }
      #gv-logo {
        font-size: 16px;
        font-weight: 700;
        color: #4ade80;
      }
      #gv-step-counter {
        font-size: 13px;
        color: #94a3b8;
      }
      #gv-progress-bar {
        height: 3px;
        background: #1e293b;
      }
      #gv-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4ade80, #22d3ee);
        width: 0%;
        transition: width 0.5s ease;
      }
      #gv-camera-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 4/3;
        background: #000;
      }
      #gv-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }
      #gv-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding-bottom: 24px;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.7) 0%,
          transparent 50%
        );
        pointer-events: none;
      }
      #gv-step-icon {
        font-size: 36px;
        margin-bottom: 8px;
      }
      #gv-instruction {
        font-size: 14px;
        text-align: center;
        padding: 0 24px;
        color: #e2e8f0;
        line-height: 1.5;
        margin-bottom: 12px;
      }
      #gv-timer-ring {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 56px;
        height: 56px;
      }
      #gv-timer-ring svg {
        width: 100%;
        height: 100%;
      }
      #gv-timer-num {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 700;
        color: #fff;
      }
      #gv-flash {
        position: absolute;
        inset: 0;
        background: #fff;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.1s;
      }
      #gv-flash.flash {
        opacity: 0.8;
      }
      #gv-status-bar {
        padding: 10px 20px;
        background: #1e293b;
        font-size: 13px;
        color: #94a3b8;
        min-height: 38px;
      }
      #gv-controls {
        padding: 16px 20px;
      }
      #gv-start-btn,
      #gv-retry-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #4ade80, #22d3ee);
        color: #0f172a;
        font-size: 15px;
        font-weight: 700;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      #gv-start-btn:hover,
      #gv-retry-btn:hover {
        opacity: 0.85;
      }
      #gv-start-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #gv-results {
        padding: 24px 20px;
        display: none;
      }
      #gv-result-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 20px;
        color: #4ade80;
      }
      .gv-dosha-row {
        margin-bottom: 14px;
      }
      .gv-dosha-label {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 4px;
        color: #cbd5e1;
      }
      .gv-dosha-track {
        height: 8px;
        background: #1e293b;
        border-radius: 4px;
        overflow: hidden;
      }
      .gv-dosha-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .gv-fill-vata {
        background: linear-gradient(90deg, #a78bfa, #7c3aed);
      }
      .gv-fill-pitta {
        background: linear-gradient(90deg, #fb923c, #dc2626);
      }
      .gv-fill-kapha {
        background: linear-gradient(90deg, #4ade80, #0891b2);
      }
      #gv-dominant-label {
        margin-top: 16px;
        font-size: 22px;
        font-weight: 800;
        color: #f8fafc;
      }
      #gv-confidence {
        font-size: 13px;
        color: #64748b;
        margin-top: 4px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <!-- ── Widget ── -->
    <div id="glucoveda-capture">
      <div id="gv-wrapper">
        <div id="gv-header">
          <div id="gv-logo">🌿 GlucoVeda Prakriti</div>
          <div id="gv-step-counter">
            Step <span id="gv-step-num">1</span> of 4
          </div>
        </div>
        <div id="gv-progress-bar"><div id="gv-progress-fill"></div></div>
        <div id="gv-camera-wrap">
          <video id="gv-video" autoplay playsinline muted></video>
          <canvas id="gv-canvas" style="display: none"></canvas>
          <div id="gv-overlay">
            <div id="gv-step-icon"></div>
            <div id="gv-instruction"></div>
            <div id="gv-timer-ring">
              <svg viewBox="0 0 100 100">
                <circle
                  cx="50"
                  cy="50"
                  r="45"
                  fill="none"
                  stroke="#ffffff22"
                  stroke-width="6"
                />
                <circle
                  id="gv-timer-arc"
                  cx="50"
                  cy="50"
                  r="45"
                  fill="none"
                  stroke="#4ade80"
                  stroke-width="6"
                  stroke-dasharray="283"
                  stroke-dashoffset="283"
                  stroke-linecap="round"
                  transform="rotate(-90 50 50)"
                />
              </svg>
              <div id="gv-timer-num">-</div>
            </div>
          </div>
          <div id="gv-flash"></div>
        </div>
        <div id="gv-status-bar">
          <span id="gv-status-text">Ready to start</span>
        </div>
        <div id="gv-controls">
          <button id="gv-start-btn">Start Analysis</button>
        </div>
        <div id="gv-results">
          <div id="gv-result-title">Your Prakriti</div>
          <div id="gv-dosha-bars"></div>
          <div id="gv-dominant-label"></div>
          <div id="gv-confidence"></div>
          <button id="gv-retry-btn">Retake</button>
        </div>
      </div>
    </div>

    <!-- ── Result JSON panel (for testing only) ── -->
    <div id="debug-label">↓ API Response JSON</div>
    <div id="debug-panel">Waiting for analysis to complete...</div>

    <script>
      const API_BASE = "https://glucoveda-prakriti-module.onrender.com";
      const STEPS = [
        {
          id: "face",
          label: "Face Scan",
          instruction: "Look straight at camera — good lighting.",
          icon: "😐",
          duration: 4000,
          type: "image",
        },
        {
          id: "body",
          label: "Body Scan",
          instruction: "Step back — full body visible head to ankles.",
          icon: "🧍",
          duration: 6000,
          type: "image",
        },
        {
          id: "tongue",
          label: "Tongue Scan",
          instruction: "Open mouth wide — stick tongue out fully.",
          icon: "👅",
          duration: 4000,
          type: "image",
        },
        {
          id: "voice",
          label: "Voice",
          instruction: "Say your full name clearly and slowly.",
          icon: "🎤",
          duration: 5000,
          type: "audio",
        },
      ];

      let stream = null,
        mediaRecorder = null,
        audioChunks = [];
      let captures = {},
        currentStep = 0;

      function setStatus(msg) {
        document.getElementById("gv-status-text").textContent = msg;
      }
      function delay(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      function countdown(durationMs) {
        return new Promise((resolve) => {
          const arc = document.getElementById("gv-timer-arc");
          const numEl = document.getElementById("gv-timer-num");
          const start = performance.now();
          function tick(now) {
            const elapsed = now - start;
            const remaining = Math.max(0, durationMs - elapsed);
            arc.setAttribute(
              "stroke-dashoffset",
              283 * (1 - elapsed / durationMs),
            );
            numEl.textContent = Math.ceil(remaining / 1000);
            remaining > 0
              ? requestAnimationFrame(tick)
              : ((numEl.textContent = "✓"), resolve());
          }
          requestAnimationFrame(tick);
        });
      }

      function captureFrame() {
        const video = document.getElementById("gv-video");
        const canvas = document.getElementById("gv-canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        const flash = document.getElementById("gv-flash");
        flash.classList.add("flash");
        setTimeout(() => flash.classList.remove("flash"), 200);
        return new Promise((resolve) =>
          canvas.toBlob(resolve, "image/jpeg", 0.92),
        );
      }

      async function recordAudio(durationMs) {
        audioChunks = [];
        const audioStream = new MediaStream(stream.getAudioTracks());
        mediaRecorder = new MediaRecorder(audioStream);
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        return new Promise((resolve) => {
          mediaRecorder.onstop = () =>
            resolve(new Blob(audioChunks, { type: "audio/wav" }));
          mediaRecorder.start();
          setTimeout(() => mediaRecorder.stop(), durationMs);
        });
      }

      async function runStep() {
        if (currentStep >= STEPS.length) {
          await submitToAPI();
          return;
        }
        const step = STEPS[currentStep];
        document.getElementById("gv-step-num").textContent = currentStep + 1;
        document.getElementById("gv-step-icon").textContent = step.icon;
        document.getElementById("gv-instruction").textContent =
          step.instruction;
        document.getElementById("gv-progress-fill").style.width =
          (currentStep / STEPS.length) * 100 + "%";
        setStatus(`${step.label} — get ready...`);
        await countdown(step.duration);
        if (step.type === "image") {
          captures[step.id] = await captureFrame();
          setStatus(`✅ ${step.label} captured`);
        } else {
          setStatus("🎤 Recording...");
          captures[step.id] = await recordAudio(step.duration - 500);
          setStatus("✅ Voice recorded");
        }
        currentStep++;
        await delay(400);
        await runStep();
      }

      async function submitToAPI() {
        document.getElementById("gv-progress-fill").style.width = "90%";
        setStatus("🔄 Analysing your Prakriti...");
        const fd = new FormData();
        fd.append("patient_id", "PT001_Test");
        fd.append("save_photos", "true");
        if (captures.face) fd.append("face_image", captures.face, "face.jpg");
        if (captures.body) fd.append("body_image", captures.body, "body.jpg");
        if (captures.tongue)
          fd.append("tongue_image", captures.tongue, "tongue.jpg");
        if (captures.voice)
          fd.append("audio_clip", captures.voice, "voice.wav");
        try {
          const res = await fetch(`${API_BASE}/analyze-prakriti`, {
            method: "POST",
            body: fd,
          });
          const data = await res.json();
          document.getElementById("gv-progress-fill").style.width = "100%";
          setStatus("✅ Analysis complete");
          showResults(data);
          document.getElementById("debug-panel").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (e) {
          setStatus("❌ API error — is server running on port 8000?");
          document.getElementById("debug-panel").textContent =
            "Error: " + e.message;
          document.getElementById("gv-start-btn").disabled = false;
        }
      }

      function showResults(data) {
        document.getElementById("gv-controls").style.display = "none";
        document.getElementById("gv-results").style.display = "block";
        const vp = data.video_partial_scores || {};
        const vata = vp.vata_visual || 0;
        const pitta = vp.pitta_visual || 0;
        const kapha = vp.kapha_visual || 0;
        document.getElementById("gv-dosha-bars").innerHTML = `
          <div class="gv-dosha-row">
            <div class="gv-dosha-label"><span>Vata</span><span>${vata}%</span></div>
            <div class="gv-dosha-track"><div class="gv-dosha-fill gv-fill-vata" style="width:0%" data-target="${vata}%"></div></div>
          </div>
          <div class="gv-dosha-row">
            <div class="gv-dosha-label"><span>Pitta</span><span>${pitta}%</span></div>
            <div class="gv-dosha-track"><div class="gv-dosha-fill gv-fill-pitta" style="width:0%" data-target="${pitta}%"></div></div>
          </div>
          <div class="gv-dosha-row">
            <div class="gv-dosha-label"><span>Kapha</span><span>${kapha}%</span></div>
            <div class="gv-dosha-track"><div class="gv-dosha-fill gv-fill-kapha" style="width:0%" data-target="${kapha}%"></div></div>
          </div>`;
        document.getElementById("gv-dominant-label").textContent =
          `Prakriti: ${data.dominant_from_video || "—"}`;
        document.getElementById("gv-confidence").textContent =
          `Confidence: ${data.confidence || 0}%  •  Modules: ${(data.modules_used || []).join(", ")}`;
        setTimeout(() => {
          document
            .querySelectorAll(".gv-dosha-fill")
            .forEach((el) => (el.style.width = el.dataset.target));
        }, 100);
        document
          .getElementById("gv-retry-btn")
          .addEventListener("click", () => location.reload());
      }

      document
        .getElementById("gv-start-btn")
        .addEventListener("click", async () => {
          document.getElementById("gv-start-btn").disabled = true;
          setStatus("Starting camera...");
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: "user" },
              audio: true,
            });
            document.getElementById("gv-video").srcObject = stream;
            await document.getElementById("gv-video").play();
          } catch (e) {
            setStatus("❌ Camera denied — allow camera access and reload");
            document.getElementById("gv-start-btn").disabled = false;
            return;
          }
          captures = {};
          currentStep = 0;
          await runStep();
        });
    </script>
  </body>
</html>
